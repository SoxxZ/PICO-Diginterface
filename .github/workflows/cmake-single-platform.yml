name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths:
      - "firmware/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "firmware/**"
      - ".github/workflows/**"

env:
  BUILD_TYPE: Release
  PICO_SDK_VERSION: "2.2.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ARM GCC cross-compiler for RP2040
      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi cmake

      # Cache the Pico SDK so it isn't re-downloaded on every run
      - name: Cache Pico SDK
        id: cache-pico-sdk
        uses: actions/cache@v4
        with:
          path: ~/pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}

      - name: Clone Pico SDK
        if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} \
            https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk && git submodule update --init --depth 1

      # Configure & build
      - name: Configure CMake
        run: |
          cmake -B ${{ github.workspace }}/build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DPICO_SDK_PATH=~/pico-sdk \
            firmware/

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      # Upload the .uf2 so it's downloadable from the Actions run page
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: ${{ github.workspace }}/build/*.uf2
          if-no-files-found: error
